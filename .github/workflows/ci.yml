name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate JSON and Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating resources/index.json..."
          jq empty resources/index.json && echo "✓ resources/index.json is valid JSON"
          echo "Validating prompts/index.json..."
          jq empty prompts/index.json && echo "✓ prompts/index.json is valid JSON"
          echo "All JSON files are valid!"

      - name: Check file structure
        run: |
          echo "Checking required files..."
          test -f README.md && echo "✓ README.md exists"
          test -f CONTRIBUTING.md && echo "✓ CONTRIBUTING.md exists"
          test -f LICENSE && echo "✓ LICENSE exists"
          test -f index.html && echo "✓ index.html exists"
          test -f CNAME && echo "✓ CNAME exists"
          test -d css && echo "✓ css/ directory exists"
          test -d js && echo "✓ js/ directory exists"
          test -d resources && echo "✓ resources/ directory exists"
          test -d prompts && echo "✓ prompts/ directory exists"
          echo "File structure is valid!"

      - name: Check JSON consistency
        run: |
          echo "Checking consistency between JSON and actual files..."
          
          # Check resources/index.json
          RESOURCES_COUNT=$(jq '. | length' resources/index.json)
          ACTUAL_RESOURCES=$(ls -1 resources/*.md 2>/dev/null | wc -l)
          echo "Resources in index.json: $RESOURCES_COUNT"
          echo "Actual resource files: $ACTUAL_RESOURCES"
          
          # Check prompts/index.json
          PROMPTS_COUNT=$(jq '. | length' prompts/index.json)
          ACTUAL_PROMPTS=$(ls -1 prompts/*.md 2>/dev/null | wc -l)
          echo "Prompts in index.json: $PROMPTS_COUNT"
          echo "Actual prompt files: $ACTUAL_PROMPTS"
          
          echo "Consistency check complete!"
